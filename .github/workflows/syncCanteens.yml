name: ♻️ Sync canteens

on:
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 5" # Friday

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: canteen-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  syncMensenatCanteens:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"

    - name: Install requirements
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Find new and outdated canteens
      run: |
        python mensenat/utils.py \
          --input mensenat/canteenDict.json \
          --output mensenat/canteenDict.json \
          --summary-json "${RUNNER_TEMP}/mensenat_canteen_sync_summary.json" \
          --pr-body "${RUNNER_TEMP}/mensenat_canteen_sync_pr_body.md"

    - name: Collect sync status
      id: status
      shell: bash
      run: |
        if git diff --quiet -- mensenat/canteenDict.json; then
          echo "has_diff=false" >> "$GITHUB_OUTPUT"
        else
          echo "has_diff=true" >> "$GITHUB_OUTPUT"
        fi

        python -c "import json, pathlib; data = json.loads(pathlib.Path('${{ runner.temp }}/mensenat_canteen_sync_summary.json').read_text(encoding='utf8')); print(f\"added_count={data['added_count']}\"); print(f\"removed_count={data['removed_count']}\")" >> "$GITHUB_OUTPUT"

    - name: Create pull request
      if: steps.status.outputs.has_diff == 'true'
      uses: peter-evans/create-pull-request@v8
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        commit-message: "Update mensen.at canteens"
        branch: automation/mensenat-canteen-sync
        delete-branch: true
        title: "Update mensen.at canteens"
        body-path: ${{ runner.temp }}/mensenat_canteen_sync_pr_body.md
        add-paths: |
          mensenat/canteenDict.json
        labels: |
          automation

    - name: Log no-op run
      if: steps.status.outputs.has_diff != 'true'
      run: |
        echo "No mensen.at canteen changes detected."
