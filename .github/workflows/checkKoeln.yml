name: ♻️ Check koeln parser

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * FRI'

permissions:
  contents: read
  issues: write

jobs:
  checkDishes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      KOELN_CLOUDMENSA_API_KEY: ${{ secrets.KOELN_CLOUDMENSA_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.14'

      - name: Install requirements
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run check script
        run: |
          python koeln/check_and_report.py --out $RUNNER_TEMP/koeln_report.json

      - name: Upload report
        uses: actions/upload-artifact@v7
        with:
          name: koeln-report
          path: ${{ runner.temp }}/koeln_report.json
